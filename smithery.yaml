name: FocusFlow by Fidubit
description: MCP server for FocusFlow by Fidubit — manage workspaces, projects, kanban boards, tasks, AI agent delegation, and orchestration via JSON-RPC 2.0
version: 2.0.0
license: MIT

icon: https://focusflow.app/icon.png

author:
  name: Fidubit
  url: https://focusflow.app

repository:
  type: git
  url: https://github.com/Alain-Colombia-Arbitrage-Mev/Proyecto

tags:
  - project-management
  - kanban
  - task-management
  - ai-agents
  - orchestrator
  - team-collaboration

# MCP Server Configuration
startCommand:
  type: http
  configSchema:
    type: object
    properties:
      url:
        type: string
        description: "FocusFlow instance URL (e.g. https://your-domain.com)"
        default: "https://focusflow.app"
      apiToken:
        type: string
        description: "API token starting with ff_ (generate in Settings > API Tokens)"
    required:
      - url
      - apiToken
  commandFunction:
    # HTTP-based MCP — no local process needed
    |-
    (config) => ({
      url: `${config.url}/api/mcp`,
      headers: {
        "Authorization": `Bearer ${config.apiToken}`,
        "Content-Type": "application/json"
      }
    })

# Claude Desktop (npx) configuration
stdioCommand:
  configSchema:
    type: object
    properties:
      url:
        type: string
        description: "FocusFlow instance URL"
        default: "https://focusflow.app"
      apiToken:
        type: string
        description: "API token starting with ff_"
    required:
      - apiToken
  commandFunction:
    |-
    (config) => ({
      command: "npx",
      args: ["-y", "mcp-remote", `${config.url || 'https://focusflow.app'}/api/mcp`, "--header", `Authorization:Bearer ${config.apiToken}`],
      env: {}
    })
